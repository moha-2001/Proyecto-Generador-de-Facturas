<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Cliente | AutoFacturar</title>
    <link rel="stylesheet" href="css/style-portalcliente.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="client-portal-body">
    <aside class="sidebar">
        <header class="logo">
            <h2>NexoDigital</h2>
            <small class="area-tag">Área Clientes</small>
        </header>
        <nav>
            <ul class="menu">
                <li>
                    <a href="panel-cliente.html"><i class="fas fa-file-invoice-dollar"></i> Mis Facturas</a>
                </li>
                <li class="active">
                    <a href="perfil-cliente.html"><i class="fas fa-user-cog"></i> Mi Perfil</a>
                </li>
            </ul>
        </nav>
        <button id="btnLogout" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
    </aside>
    <main class="main-content">
        <header class="page-header">
            <h1>Mi Perfil</h1>
            <p class="subtitle">Gestiona tus datos personales y seguridad</p>
        </header>
        <section class="profile-section">
            <div class="card card-profile">
                <header class="card-header border-blue">
                    <h3><i class="fas fa-id-card"></i> Mis Datos</h3>
                </header>  
                <form id="formDatos" class="styled-form">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="nombreCli">Nombre Completo</label>
                            <input type="text" id="nombreCli" name="nombreCli" required>
                        </div>
                        <div class="input-group">
                            <label for="cifCli">DNI / NIF</label>
                            <input type="text" id="cifCli" name="cifCli" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label for="emailCli">Email</label>
                            <input type="email" id="emailCli" name="emailCli" required>
                        </div>
                        <div class="input-group">
                            <label for="telCli">Teléfono</label>
                            <input type="tel" id="telCli" name="telCli">
                        </div>
                    </div>
                    <div class="input-group full-width">
                        <label for="dirCli">Dirección</label>
                        <input type="text" id="dirCli" name="dirCli">
                    </div>
                    <footer class="form-actions">
                        <button type="submit" class="btn-primary-blue">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                    </footer>
                </form>
            </div>
        </section>
        <section class="profile-section security-margin">
            <div class="card card-profile">
                <header class="card-header border-red">
                    <h3><i class="fas fa-shield-alt"></i> Seguridad</h3>
                </header>
                <form id="formPassword" class="styled-form">
                    <div class="input-group full-width">
                        <label for="passActual">Contraseña Actual</label>
                        <input type="password" id="passActual" name="passActual" required>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label for="passNueva">Nueva Contraseña</label>
                            <input type="password" id="passNueva" name="passNueva" required>
                        </div>
                        <div class="input-group">
                            <label for="passConfirm">Confirmar Nueva</label>
                            <input type="password" id="passConfirm" name="passConfirm" required>
                        </div>
                    </div>
                    <footer class="form-actions">
                        <button type="submit" class="btn-danger">
                            <i class="fas fa-lock"></i> Actualizar Contraseña
                        </button>
                    </footer>
                </form>
            </div>
        </section>
    </main>
    <script src="js/perfil-cliente.js"></script>
</body>
</html>
