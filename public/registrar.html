<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Empresa - AutoFacturar</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/registrar.css">
</head>
<body>
    <main class="contenido">
        <section class="cajas">
            <header>
                <h2>Registro de Empresa</h2>
                <p class="subtitle">Crea tu cuenta para empezar a gestionar facturas</p>
            </header><br>
            <form id="registroForm">
                <div class="form-row">
                    <div class="input-group">
                        <label for="nombre">Nombre / Razón Social *</label>
                        <input type="text" id="nombre" name="nombre" required>
                    </div>
                    <div class="input-group">
                        <label for="cif">CIF / NIF *</label>
                        <input type="text" id="cif" name="cif" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono">
                    </div>
                    <div class="input-group">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" name="direccion">
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label for="password">Contraseña *</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">Confirmar Contraseña *</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Registrar Empresa</button>
            </form><br>
            <footer>
                <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a></p>
            </footer>
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
