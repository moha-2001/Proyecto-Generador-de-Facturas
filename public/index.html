<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - AutoFacturar</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="contenido">
        <section class="cajas">
            <header>
                <h2>Bienvenido</h2>
                <p class="subtitulo">Selecciona tu perfil para entrar</p>
            </header>
            <form id="loginForm">
                <fieldset class="user-type-selector">
                    <legend class="sr-only">Tipo de usuario</legend>
                    <input type="radio" name="tipoUsuario" id="tipoEmpresa" value="empresa" checked>
                    <label for="tipoEmpresa">Soy Empresa</label>
                    <input type="radio" name="tipoUsuario" id="tipoCliente" value="cliente">
                    <label for="tipoCliente">Soy Cliente</label>
                </fieldset>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>
            <footer>
                <p>¿Eres empresa y no tienes cuenta? <a href="registrar.html">Regístrate aquí</a></p>
            </footer>
        </section>
    </main>
    <script src="js/login.js"></script>
</body>
</html>
