<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - Cliente | AutoFacturar</title>
    <link rel="stylesheet" href="css/style-portalcliente.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <header class="logo">
            <h2>NexoDigital</h2>
            <small class="area-tag">Área Clientes</small>
        </header>
        <nav>
            <ul class="menu">
                <li class="active">
                    <a href="panel-cliente.html"><i class="fas fa-file-invoice-dollar"></i> Mis Facturas</a>
                </li>
                <li>
                    <a href="perfil-cliente.html"><i class="fas fa-user-cog"></i> Mi Perfil</a>
                </li>
            </ul>
        </nav>

        <button id="btnLogout" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </button>
    </aside>
    <main class="main-content">
        <header class="main-header">
            <div class="welcome-text">
                <h1>Hola, <span id="nombreCliente" class="text-primary">Cliente</span></h1>
                <p class="subtitle">Bienvenido a tu espacio privado</p>
            </div>
        </header>
        <section class="content-body">
            <div class="card">
                <header class="card-header">
                    <h3><i class="fas fa-history"></i> Historial de Facturas</h3>
                </header>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Empresa</th>
                                <th>Nº Factura</th>
                                <th>Fecha</th>
                                <th>Total</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="facturasClienteTable">
                            <tr>
                                <td colspan="6" class="text-center loading-row">Cargando facturas...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const btnLogout = document.getElementById('btnLogout');
            if (btnLogout) {
                btnLogout.addEventListener('click', () => {
                    if(confirm("¿Seguro que quieres salir?")) {
                        localStorage.clear();
                        window.location.href = 'index.html';
                    }
                });
            }

            const clienteId = localStorage.getItem('clienteId');
            const nombre = localStorage.getItem('clienteNombre');
            
            if (!clienteId) {
                window.location.href = 'index.html';
                return;
            }
            const spanNombre = document.getElementById('nombreCliente');
            if (spanNombre) spanNombre.textContent = nombre || 'Cliente';
            const tbody = document.getElementById('facturasClienteTable');     
            try {
                // Simulación de fetch (mantén tu endpoint real)
                const res = await fetch(`/api/facturas/mis-facturas/${clienteId}`);
                const facturas = await res.json();
                
                tbody.innerHTML = '';

                if (facturas.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="empty-table-msg">
                                <i class="fas fa-folder-open"></i>
                                <p>No hay facturas disponibles.</p>
                            </td>
                        </tr>`;
                    return;
                }
                facturas.forEach(fac => {
                    // Usamos las clases definidas en style-portalcliente.css
                    const claseEstado = fac.estado === 'Pagada' ? 'status-pagada' : 'status-pendiente';
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${fac.empresa_id?.nombre || 'Empresa'}</strong></td>
                            <td>${fac.numero}</td>
                            <td>${new Date(fac.fecha_emision).toLocaleDateString()}</td>
                            <td class="text-bold">${fac.total.toFixed(2)} €</td>
                            <td>
                                <span class="status-badge ${claseEstado}">
                                    ${fac.estado}
                                </span>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <a href="/facturas/factura-${fac.numero}.pdf" target="_blank" class="action-btn btn-view" title="Ver">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <a href="/facturas/factura-${fac.numero}.pdf" download class="action-btn btn-download" title="Descargar">
                                        <i class="fas fa-download"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-error">Error al cargar datos.</td></tr>';
            }
        });
    </script>
</body>
</html>
