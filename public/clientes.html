<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Clientes - AutoFacturar</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/clientes.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/reset.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <h2>NexoDigital</h2> 
        </div>
        <nav>
            <ul class="menu">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Panel</a></li> 
                <li class="active"><a href="clientes.html"><i class="fas fa-users"></i> Clientes</a></li> 
                <li><a href="facturas.html"><i class="fas fa-file-invoice"></i> Facturas</a></li> 
                <li><a href="crear-factura.html"><i class="fas fa-plus-circle"></i> Nueva Factura</a></li>
                <li><a href="perfil.html"><i class="fas fa-cog"></i> Perfil Empresa</a></li> 
            </ul>
        </nav>
        <button id="btnLogout" class="btncerrar">
            <i class="fas fa-sign-out-alt"></i>
            <span>Salir</span>
        </button>    
    </aside>
    <main class="contenido">
        <header>
            <h1>Gestión de Clientes</h1>
            <div class="header-tools">
                <form class="search-bar" role="search">
                    <label for="buscarCliente" class="sr-only">Buscar cliente</label>
                    <i class="fas fa-search" aria-hidden="true"></i>
                    <input type="text" id="buscarCliente" placeholder="Buscar cliente...">
                </form>
                <a href="crear-cliente.html" class="btn-action purple">
                    <i class="fas fa-user-plus"></i> Nuevo Cliente
                </a>
            </div>
        </header>
        <section class="tabla-contenido">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Nombre Fiscal</th>
                        <th>CIF / NIF</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="clientesTableBody">
                    <tr>
                        <td colspan="5" class="text-center">Cargando clientes...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
    <script src="js/clientes.js"></script>
</body>
</html>
