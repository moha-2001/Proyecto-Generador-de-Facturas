<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Cliente - AutoFacturar</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/crear-cliente.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/forms.css"> <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="logo">
            <h2>NexoDigital</h2> 
        </div>
        <nav>
            <ul class="menu">
                <li ><a href="dashboard.html"><i class="fas fa-home"></i> Panel</a></li> 
                <li class="active"><a href="clientes.html"><i class="fas fa-users"></i> Clientes</a></li> 
                <li ><a href="facturas.html"><i class="fas fa-file-invoice"></i> Facturas</a></li> 
                <li><a href="crear-factura.html"><i class="fas fa-plus-circle"></i> Nueva Factura</a></li>
                <li><a href="perfil.html"><i class="fas fa-cog"></i> Perfil Empresa</a></li> 
            </ul>
        </nav>
        <button id="btnLogout" class="btncerrar">
            <i class="fas fa-sign-out-alt"></i>
            <span>Salir</span>
        </button>    
    </aside>
    <main class="contenido">
        <header class="page-header">
            <h1>Añadir Nuevo Cliente</h1>
            <a href="clientes.html" class="btn-secondary">
                <i class="fas fa-times"></i> Cancelar
            </a>
        </header>
        <section class="form-contenido">
            <div class="card card-form">
                <form id="crearClienteForm">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="nombreCli">Nombre Fiscal / Razón Social *</label>
                            <input type="text" id="nombreCli" name="nombreCli" required placeholder="Ej: Servicios Rápidos S.L.">
                        </div>
                        <div class="input-group">
                            <label for="cifCli">CIF / NIF *</label>
                            <input type="text" id="cifCli" name="cifCli" required placeholder="B12345678">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="input-group">
                            <label for="emailCli">Email Principal *</label>
                            <input type="email" id="emailCli" name="emailCli" required>
                        </div>
                        <div class="input-group">
                            <label for="telCli">Teléfono</label>
                            <input type="tel" id="telCli" name="telCli">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="dirCli">Dirección Completa</label>
                        <input type="text" id="dirCli" name="dirCli" placeholder="Calle, Número, Ciudad y CP">
                    </div>
                    <footer class="form-actions">
                        <button type="submit" class="btn-primary">
                            <i class="fas"></i> Guardar Cliente
                        </button>
                    </footer>
                </form>
            </div>
        </section>
    </main>
    <script src="js/crear-cliente.js"></script>
</body>
</html>
